<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tic-Tac-Toe Game</title>
        <link rel="stylesheet" href="style.css">
</head>
    <body>
        <header>
            <h1>Tic Tac Toe</h1>
        </header>
        <div class="msg-container hide">
            <p id="msg">Winner</p>
            <button id="new-btn">New Game</button>
        </div>
        <div class="main-reset-msg msg2">
            <div class="reset-msg">
                <div class="main-msg">Are you sure, you want to reset game</div>
                <div id="sug-btn">
                    <button class="sg-btn yes">Yes</button>
                    <button class="sg-btn no">No</button>
                </div>
            </div>
        </div>
        <main class="main">
            <div class="container">
                <div class="game">
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                </div>
            </div>
            <button id="reset-btn">Reset Game</button>
        </main>



        <script src="script.js"></script>
    </body>
</html>
